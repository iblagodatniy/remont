<html lang="ru">
<head>
<meta charset="UTF-8">

<title>План ремонта</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#f8fafc;color:#111827}
.wrapper{max-width:1320px;margin:0 auto;padding:22px}
h1{margin:0 0 8px;font-size:28px}.subtitle{margin:0 0 16px;color:#64748b;font-size:14px;line-height:1.5}
.legend,.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}.legend-card,.panel{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:12px 14px;box-shadow:0 2px 10px rgba(15,23,42,.05);font-size:14px}.legend-red{border-left:5px solid #fb7185}.legend-yellow{border-left:5px solid #facc15}.legend-blue{border-left:5px solid #60a5fa}.legend-green{border-left:5px solid #34d399}
button{border:1px solid #d1d5db;background:#fff;border-radius:10px;padding:9px 12px;cursor:pointer;color:#111827;font-size:14px}button:hover{background:#f3f4f6}.danger{border-color:#fecaca;background:#fff1f2}.primary{border-color:#93c5fd;background:#eff6ff}
.progress{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:14px;margin-bottom:16px;box-shadow:0 2px 10px rgba(15,23,42,.05)}.progress-top{display:flex;justify-content:space-between;margin-bottom:10px;color:#374151;font-size:14px}.progress-line{height:12px;background:#e5e7eb;border-radius:999px;overflow:hidden}.progress-fill{height:100%;width:0;background:linear-gradient(135deg,#34d399,#10b981);transition:.2s}
.stage{background:#fff;border:1px solid #e5e7eb;border-radius:16px;margin-bottom:16px;box-shadow:0 3px 14px rgba(15,23,42,.06);overflow:hidden}.stage-head{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:15px 16px;cursor:pointer;border-bottom:1px solid #e5e7eb}.stage-head h2{margin:0;font-size:18px}.stage-body{padding:16px}.stage.collapsed .stage-body{display:none}.stage-actions{display:flex;gap:8px;align-items:center}.small{font-size:12px;padding:6px 9px;border-radius:8px}
.tasks{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:12px}.task{border-radius:14px;padding:12px;border:1px solid #e5e7eb;display:flex;flex-direction:column;gap:9px;min-height:170px}.task-red{background:#fff1f2;border-color:#fecdd3}.task-yellow{background:#fffbeb;border-color:#fde68a}.task-blue{background:#eff6ff;border-color:#bfdbfe}.task-green{background:#ecfdf5;border-color:#a7f3d0}.task.done{opacity:.58}.task.done .task-title{text-decoration:line-through}.task-main{display:flex;gap:9px;align-items:flex-start}.task-main input{width:18px;height:18px;margin-top:1px;cursor:pointer;flex:0 0 auto}.task-title{font-size:14px;line-height:1.45}.role{font-size:12px;font-weight:700}.role-red{color:#be123c}.role-yellow{color:#a16207}.role-blue{color:#1d4ed8}.role-green{color:#047857}.switcher{display:flex;flex-wrap:wrap;gap:6px}.switcher button{font-size:12px;padding:5px 8px;border-radius:8px}.cost-box{background:rgba(255,255,255,.72);border:1px solid rgba(209,213,219,.9);border-radius:12px;padding:9px;display:flex;flex-direction:column;gap:7px}.cost-head{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:700}.cost-item{border-top:1px dashed #d1d5db;padding-top:8px}.cost-row{display:grid;grid-template-columns:1fr 92px;gap:8px;align-items:center}.cost-row input[type=range]{width:100%}.cost-row input[type=number]{width:92px;border:1px solid #d1d5db;border-radius:8px;padding:6px}.cost-note{width:100%;min-height:38px;border:1px solid #d1d5db;border-radius:8px;padding:7px;font-size:12px;resize:vertical}.remove-cost{font-size:12px;padding:4px 7px;border-radius:7px;background:#fff1f2;border-color:#fecaca}.sum{font-size:12px;color:#475569}.hidden{display:none!important}
.modal{position:fixed;inset:0;background:rgba(15,23,42,.42);display:none;align-items:center;justify-content:center;padding:16px;z-index:50}.modal.show{display:flex}.modal-box{width:min(980px,96vw);max-height:90vh;background:#fff;border-radius:16px;box-shadow:0 20px 70px rgba(15,23,42,.25);overflow:hidden}.modal-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid #e5e7eb}.modal-body{padding:16px;overflow:auto;max-height:calc(90vh - 62px)}.editor-stage{border:1px solid #e5e7eb;border-radius:12px;margin-bottom:12px;padding:12px}.editor-stage h3{margin:0 0 8px}.editor-task{display:grid;grid-template-columns:22px 1fr auto;gap:8px;align-items:center;margin:6px 0}.editor-task input[type=text]{width:100%;border:1px solid #d1d5db;border-radius:8px;padding:7px}.editor-task select{border:1px solid #d1d5db;border-radius:8px;padding:7px;background:#fff}
@media(max-width:720px){.wrapper{padding:14px}.tasks{grid-template-columns:1fr}.cost-row{grid-template-columns:1fr}.cost-row input[type=number]{width:100%}.stage-head{align-items:flex-start}.stage-actions{flex-wrap:wrap;justify-content:flex-end}}
</style>
</head>
<body>
<div class="wrapper">
<h1>План ремонта</h1>
<p class="subtitle">Чек-лист с ролями, стоимостью работ и материалов. Все данные сохраняются в браузере.</p>
<div class="legend">
<div class="legend-card legend-red">🟥 Красный: делаю я</div><div class="legend-card legend-yellow">🟨 Желтый: наемные люди</div><div class="legend-card legend-blue">🟦 Синий: спецмонтаж</div><div class="legend-card legend-green">🟩 Зеленый: проектировщик</div>
</div>
<div class="progress"><div class="progress-top"><span id="progressText">Выполнено: 0 из 0</span><span id="progressPercent">0%</span></div><div class="progress-line"><div class="progress-fill" id="progressFill"></div></div></div>
<div class="toolbar">
<button onclick="checkAll()">Отметить все</button><button onclick="uncheckAll()">Снять все</button><button onclick="toggleDone()" id="hideDoneBtn">Скрыть выполненные</button><button onclick="collapseAll()">Свернуть все блоки</button><button onclick="expandAll()">Развернуть все блоки</button><button onclick="openEditor()" class="primary">Редактировать список пунктов</button><button onclick="resetAll()" class="danger">Сбросить все данные</button>
</div>
<div class="panel" id="summary"></div>
<div id="app"></div>
</div>

<div class="modal" id="editorModal"><div class="modal-box"><div class="modal-head"><b>Редактирование пунктов</b><div><button onclick="saveEditor()" class="primary">Сохранить</button> <button onclick="closeEditor()">Закрыть</button></div></div><div class="modal-body" id="editorBody"></div></div></div>

<script>
const defaultSections=[
{title:'1. Подготовка объекта к работам',tasks:[{c:'red',t:'Организация жизни на объекте'},{c:'red',t:'Первичная закупка: укрывочная пленка, мешки для мусора, все для уборки'},{c:'yellow',t:'Комплектация "расходников", формы и защиты'},{c:'red',t:'Организация складирования материалов внутри дома'},{c:'red',t:'Организация зон: хранение, резка, грязные работы'},{c:'red',t:'Проверка доступа на участок (подъезд, разгрузка)'},{c:'red',t:'Организация освещения на объекте'},{c:'red',t:'Организация вывоза мусора'}]},
{title:'2. Обследование дома и исходных условий',tasks:[{c:'red',t:'Осмотр каркаса, стен, перекрытий'},{c:'red',t:'Проверка геометрии стен и полов'},{c:'red',t:'Проверка кровли и возможных протечек'},{c:'red',t:'Проверка оконных и дверных проемов'},{c:'red',t:'Проверка существующей электрики'},{c:'red',t:'Проверка скважины (дебит, насос, качество воды)'},{c:'red',t:'Проверка возможности канализации (грунт, уклон)'},{c:'red',t:'Осмотр участка под дренаж и ливневку'}]},
{title:'3. Базовое приведение инженерии в рабочее состояние',tasks:[{c:'red',t:'Проверка и запуск водоснабжения'},{c:'red',t:'Проверка давления воды'},{c:'red',t:'Проверка стабильности электропитания'},{c:'red',t:'Устранение критичных проблем (вода, свет)'},{c:'red',t:'Организация точек подключения для инструмента'},{c:'red',t:'Организация базового водоотведения'}]},
{title:'4. Первичная закупка и организация материалов',tasks:[{c:'red',t:'Закупка черновых материалов'},{c:'red',t:'Закупка инструмента при необходимости'},{c:'red',t:'Закупка расходников'},{c:'red',t:'Организация хранения и учета материалов'},{c:'red',t:'Разделение материалов по этапам работ'}]},
{title:'5. Замеры и фиксация исходных данных',tasks:[{c:'red',t:'Замер пластиковых окон'},{c:'red',t:'Замер входной двери'},{c:'red',t:'Замеры под фасад и утепление'},{c:'red',t:'Замеры под отопление и радиаторы'},{c:'red',t:'Замеры под электрику (щит, точки)'},{c:'red',t:'Замеры под сантехнику'},{c:'red',t:'Замеры кухни'},{c:'red',t:'Замеры санузлов'},{c:'red',t:'Замеры террасы'}]},
{title:'6. Проектные решения и согласования',tasks:[{c:'red',t:'Окончательный выбор чистовых материалов'},{c:'red',t:'Окончательный выбор кухни'},{c:'red',t:'Получение тех требований от кухни'},{c:'red',t:'Принятие решения по отоплению (система, схема)'},{c:'red',t:'Расчет мощности электрокотла'},{c:'red',t:'Принятие решения по водоочистке'},{c:'red',t:'Принятие решения по канализации (септик/ЛОС)'},{c:'red',t:'Планировка электрики (щит, группы, точки)'},{c:'green',t:'Внесение корректировок в проект'}]},
{title:'7. Демонтаж и расчистка',tasks:[{c:'red',t:'Демонтаж стен и перегородок'},{c:'red',t:'Формирование дверных проемов'},{c:'red',t:'Демонтаж старых покрытий (пол, стены, потолок)'},{c:'red',t:'Демонтаж внешней отделки (если есть)'},{c:'red',t:'Демонтаж покрытия террасы'},{c:'red',t:'Вывоз строительного мусора'}]},
{title:'8. Скважина, вода и ввод в дом',tasks:[{c:'red',t:'Замена или установка скважинного насоса'},{c:'yellow',t:'Настройка давления воды'},{c:'yellow',t:'Установка гидроаккумулятора'},{c:'yellow',t:'Установка автоматики'},{c:'yellow',t:'Монтаж фильтров (механика, обезжелезивание)'},{c:'yellow',t:'Ввод воды в дом'},{c:'yellow',t:'Разводка водоснабжения'}]},
{title:'9. Канализация',tasks:[{c:'red',t:'Разметка трассы канализации'},{c:'yellow',t:'Установка септика или ЛОС'},{c:'yellow',t:'Прокладка наружной канализации'},{c:'yellow',t:'Разводка канализации внутри дома'},{c:'yellow',t:'Монтаж фановой трубы'}]},
{title:'10. Дренаж и ливневая система',tasks:[{c:'red',t:'Разметка участка под дренаж'},{c:'yellow',t:'Устройство дренажа по периметру'},{c:'yellow',t:'Укладка дренажных труб'},{c:'yellow',t:'Устройство ливневой системы'},{c:'yellow',t:'Организация отвода воды от дома'}]},
{title:'11. Наружный контур',tasks:[{c:'yellow',t:'Подготовка стен под утепление'},{c:'yellow',t:'Монтаж утеплителя'},{c:'yellow',t:'Укладка ветрозащитной мембраны'},{c:'yellow',t:'Устройство вентзазора'},{c:'yellow',t:'Монтаж обрешетки'},{c:'blue',t:'Установка окон'},{c:'blue',t:'Установка входной двери'},{c:'yellow',t:'Монтаж фасадного покрытия'}]},
{title:'12. Черновая инженерия',tasks:[{c:'red',t:'Вызов специалистов (при необходимости)'},{c:'yellow',t:'Штробление стен'},{c:'yellow',t:'Монтаж черновой электрики'},{c:'yellow',t:'Монтаж электрического щита'},{c:'yellow',t:'Монтаж черновой сантехники'},{c:'yellow',t:'Монтаж слаботочных сетей'},{c:'yellow',t:'Прокладка трасс кондиционеров'}]},
{title:'13. Отопление и климат',tasks:[{c:'yellow',t:'Монтаж электрокотла'},{c:'yellow',t:'Разводка отопления'},{c:'yellow',t:'Установка радиаторов'},{c:'yellow',t:'Монтаж теплых полов'},{c:'yellow',t:'Установка циркуляционного насоса'},{c:'yellow',t:'Заполнение и опрессовка системы'},{c:'yellow',t:'Монтаж внешних блоков кондиционеров'}]},
{title:'14. Внутренняя отделка',tasks:[{c:'yellow',t:'Подготовка полов'},{c:'yellow',t:'Заливка стяжки'},{c:'yellow',t:'Возведение фальш-стен'},{c:'yellow',t:'Формирование коробов'},{c:'yellow',t:'Грунтование стен'},{c:'yellow',t:'Шпаклевание и ошкуривание'},{c:'red',t:'Замер натяжных потолков'},{c:'yellow',t:'Гидроизоляция мокрых зон'},{c:'yellow',t:'Укладка плитки'},{c:'yellow',t:'Установка ванны и сантехники (черновая стадия)'},{c:'yellow',t:'Наливной пол'},{c:'yellow',t:'Установка подоконников и откосов'},{c:'yellow',t:'Поклейка обоев'},{c:'yellow',t:'Покраска'},{c:'blue',t:'Установка потолков'},{c:'yellow',t:'Укладка напольных покрытий'}]},
{title:'15. Финал и завершение',tasks:[{c:'yellow',t:'Укладка пола на террасе'},{c:'yellow',t:'Усиление конструкции террасы'},{c:'blue',t:'Установка межкомнатных дверей'},{c:'blue',t:'Установка кухни'},{c:'blue',t:'Установка мебели'},{c:'yellow',t:'Установка плинтусов'},{c:'yellow',t:'Чистовая электрика'},{c:'blue',t:'Подключение кондиционеров'},{c:'yellow',t:'Чистовая сантехника'},{c:'yellow',t:'Генеральная уборка'},{c:'yellow',t:'Герметизация и мелкие доработки'}]}
];
const storageKey='repair-super-plan-v1';let saved=JSON.parse(localStorage.getItem(storageKey)||'{}');let sections=saved.sections||defaultSections;let state=saved.state||{};let hideDone=false;
const app=document.getElementById('app'),progressText=document.getElementById('progressText'),progressPercent=document.getElementById('progressPercent'),progressFill=document.getElementById('progressFill'),summary=document.getElementById('summary');
function persist(){localStorage.setItem(storageKey,JSON.stringify({sections,state}))}function id(si,ti){return si+'_'+ti}function roleName(c){return c==='red'?'делаю я':c==='yellow'?'наемные люди':c==='blue'?'спецмонтаж':c==='green'?'проектировщик':''}function roleButtonText(c){return c==='red'?'я':c==='yellow'?'наемные':c==='blue'?'спецмонтаж':c==='green'?'проектировщик':''}function rub(n){return (Number(n)||0).toLocaleString('ru-RU')+' ₽'}function getColor(task,tid){return state[tid]?.color||task.c}
function render(){app.innerHTML='';sections.forEach((section,si)=>{const st=document.createElement('div');st.className='stage'+(state['stage_'+si]?.collapsed?' collapsed':'');const head=document.createElement('div');head.className='stage-head';head.onclick=e=>{if(e.target.tagName!=='BUTTON'){toggleStage(si)}};const h=document.createElement('h2');h.textContent=section.title;const acts=document.createElement('div');acts.className='stage-actions';const cnt=document.createElement('span');cnt.className='sum';let done=section.tasks.filter((t,ti)=>state[id(si,ti)]?.done).length;cnt.textContent=done+' / '+section.tasks.length;const collapse=document.createElement('button');collapse.className='small';collapse.textContent=state['stage_'+si]?.collapsed?'Развернуть':'Свернуть';collapse.onclick=e=>{e.stopPropagation();toggleStage(si)};acts.appendChild(cnt);acts.appendChild(collapse);head.appendChild(h);head.appendChild(acts);const body=document.createElement('div');body.className='stage-body';const tasks=document.createElement('div');tasks.className='tasks';section.tasks.forEach((task,ti)=>{const tid=id(si,ti);state[tid]=state[tid]||{};if(hideDone&&state[tid].done)return;tasks.appendChild(taskCard(task,si,ti,tid))});body.appendChild(tasks);st.appendChild(head);st.appendChild(body);app.appendChild(st)});updateProgress();persist()}
function taskCard(task,si,ti,tid){const color=getColor(task,tid);const card=document.createElement('div');card.className='task task-'+color+(state[tid].done?' done':'');const main=document.createElement('label');main.className='task-main';const cb=document.createElement('input');cb.type='checkbox';cb.checked=!!state[tid].done;cb.onchange=()=>{state[tid].done=cb.checked;render()};const span=document.createElement('span');span.className='task-title';span.textContent=task.t;main.appendChild(cb);main.appendChild(span);const role=document.createElement('div');role.className='role role-'+color;role.textContent=roleName(color);const sw=document.createElement('div');sw.className='switcher';['red','yellow','blue','green'].forEach(c=>{const b=document.createElement('button');b.textContent=roleButtonText(c);b.style.background=c===color?(c==='red'?'#fb7185':c==='yellow'?'#facc15':c==='blue'?'#60a5fa':'#34d399'):'#fff';b.style.fontWeight=c===color?'700':'400';b.onclick=()=>{state[tid].color=c;render()};sw.appendChild(b)});card.appendChild(main);card.appendChild(role);card.appendChild(sw);card.appendChild(costBox(tid,'work','Стоимость работ',1000000,5000));card.appendChild(costBox(tid,'materials','Стоимость материалов',500000,2500));return card}
function costBox(tid,key,title,max,step){state[tid][key]=state[tid][key]||[];const box=document.createElement('div');box.className='cost-box';const head=document.createElement('div');head.className='cost-head';const total=state[tid][key].reduce((s,x)=>s+(Number(x.value)||0),0);head.innerHTML='<span>'+title+': '+rub(total)+'</span>';const add=document.createElement('button');add.className='small';add.textContent='+';add.onclick=()=>{state[tid][key].push({value:0,note:''});render()};head.appendChild(add);box.appendChild(head);state[tid][key].forEach((item,i)=>{const it=document.createElement('div');it.className='cost-item';const row=document.createElement('div');row.className='cost-row';const range=document.createElement('input');range.type='range';range.min=0;range.max=max;range.step=step;range.value=item.value||0;const num=document.createElement('input');num.type='number';num.min=0;num.max=max;num.step=step;num.value=item.value||0;range.oninput=()=>{item.value=range.value;num.value=range.value;persist();updateProgress()};num.oninput=()=>{item.value=num.value;range.value=num.value;persist();updateProgress()};row.appendChild(range);row.appendChild(num);const note=document.createElement('textarea');note.className='cost-note';note.maxLength=100;note.placeholder='Имя, телефон, комментарий';note.value=item.note||'';note.oninput=()=>{item.note=note.value;persist()};const rem=document.createElement('button');rem.className='remove-cost';rem.textContent='Удалить поле';rem.onclick=()=>{state[tid][key].splice(i,1);render()};it.appendChild(row);it.appendChild(note);it.appendChild(rem);box.appendChild(it)});return box}
function updateProgress(){let total=0,done=0,work=0,mat=0;sections.forEach((s,si)=>s.tasks.forEach((t,ti)=>{const tid=id(si,ti);total++;if(state[tid]?.done)done++;(state[tid]?.work||[]).forEach(x=>work+=Number(x.value)||0);(state[tid]?.materials||[]).forEach(x=>mat+=Number(x.value)||0)}));const p=total?Math.round(done/total*100):0;progressText.textContent='Выполнено: '+done+' из '+total;progressPercent.textContent=p+'%';progressFill.style.width=p+'%';summary.textContent='Итого работ: '+rub(work)+' | Итого материалов: '+rub(mat)+' | Общий ориентир: '+rub(work+mat)}
function toggleStage(si){state['stage_'+si]=state['stage_'+si]||{};state['stage_'+si].collapsed=!state['stage_'+si].collapsed;render()}function checkAll(){sections.forEach((s,si)=>s.tasks.forEach((t,ti)=>{state[id(si,ti)]=state[id(si,ti)]||{};state[id(si,ti)].done=true}));render()}function uncheckAll(){sections.forEach((s,si)=>s.tasks.forEach((t,ti)=>{state[id(si,ti)]=state[id(si,ti)]||{};state[id(si,ti)].done=false}));render()}function toggleDone(){hideDone=!hideDone;document.getElementById('hideDoneBtn').textContent=hideDone?'Показать выполненные':'Скрыть выполненные';render()}function collapseAll(){sections.forEach((s,si)=>{state['stage_'+si]=state['stage_'+si]||{};state['stage_'+si].collapsed=true});render()}function expandAll(){sections.forEach((s,si)=>{state['stage_'+si]=state['stage_'+si]||{};state['stage_'+si].collapsed=false});render()}function resetAll(){if(confirm('Сбросить галочки, роли, суммы и комментарии?')){state={};render()}}
function openEditor(){const m=document.getElementById('editorModal'),body=document.getElementById('editorBody');body.innerHTML='';sections.forEach((s,si)=>{const div=document.createElement('div');div.className='editor-stage';const h=document.createElement('h3');h.textContent=s.title;div.appendChild(h);s.tasks.forEach((t,ti)=>{const row=document.createElement('div');row.className='editor-task';const show=document.createElement('input');show.type='checkbox';show.checked=!t.hidden;const txt=document.createElement('input');txt.type='text';txt.value=t.t;const sel=document.createElement('select');['red','yellow','blue','green'].forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=roleName(c);if(t.c===c)o.selected=true;sel.appendChild(o)});row.appendChild(show);row.appendChild(txt);row.appendChild(sel);div.appendChild(row);row.dataset.si=si;row.dataset.ti=ti;row._show=show;row._txt=txt;row._sel=sel});body.appendChild(div)});m.classList.add('show')}function closeEditor(){document.getElementById('editorModal').classList.remove('show')}function saveEditor(){document.querySelectorAll('.editor-task').forEach(row=>{const si=+row.dataset.si,ti=+row.dataset.ti;sections[si].tasks[ti].t=row._txt.value;sections[si].tasks[ti].c=row._sel.value;sections[si].tasks[ti].hidden=!row._show.checked});sections=sections.map(s=>({...s,tasks:s.tasks.filter(t=>!t.hidden)}));closeEditor();render()}
render();
</script>
